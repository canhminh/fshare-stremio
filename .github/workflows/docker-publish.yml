name: Build and Publish Stremio Addon

# Trigger the automation engine every time a push event hits the main branch
on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  # ⚠️ MANUALLY REPLACE THIS WITH YOUR LOWERCASE GITHUB USERNAME AND REPO NAME
  # Example: ghcr.io/john-doe/fshare-stremio
  IMAGE_TAG: ghcr.io/canhminh/fshare-stremio:latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    # Explicitly grant permission bounds to write container packages to your profile
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Source Repository
        uses: actions/checkout@v4

      # Set up QEMU for multi-platform hardware architecture support
      - name: Set up QEMU Hardware Emulators
        uses: docker/setup-qemu-action@v3

      # Set up the advanced Buildx compilation toolkit 
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Authenticate securely using the automatic system workflow token
      - name: Log into GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build the Go application binary for standard x86 servers and deploy to the cloud
      - name: Compile, Package, and Push Multi-Platform Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE_TAG }}